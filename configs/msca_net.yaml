seed: 42
model:
  name: msca_net
  num_channels: 27
  num_classes: 17
  hidden_channels: 128
  num_blocks: 4
  dropout: 0.1
  input_layout: btc
  use_se: true
  use_attention_pool: true
  downsample: true
  use_graph_front: true
  graph_embed_dim: 10
data:
  data_dir: src/data/Z24-dataset-processed
  input_file: inputs.npy
  label_file: labels.npy
  input_layout: nct
  seq_len: 6000
  normalization: sample
  window_length: 768
  crop_mode: random_train_center_eval
  temporal_stride: 1
  transform: diff
  train_ratio: 0.7
  val_ratio: 0.15
  num_workers: 0
  augment: true
  dummy_samples: 128
  eval_num_crops: 1
  window_mode: crop
  hop_length: 384
  taper: none
  bandpass_filter: false
  sampling_rate: 100.0
  lowcut: 0.5
  highcut: 40.0
  filter_order: 4
  split_strategy: stratified
  jitter_std: 0.005
  scaling_std: 0.0
  time_mask_ratio: 0.0
  channel_mask_ratio: 0.0
training:
  batch_size: 64
  epochs: 120
  learning_rate: 0.0008
  weight_decay: 0.0002
  device: auto
  best_checkpoint_path: outputs/msca_net/best.pt
  last_checkpoint_path: outputs/msca_net/last.pt
  checkpoint_path: outputs/msca_net/best.pt
  history_path: outputs/msca_net/history.csv
  training_log_path: outputs/msca_net/training_log.txt
  metrics_path: outputs/msca_net/metrics.json
  confusion_matrix_npy_path: outputs/msca_net/confusion_matrix.npy
  confusion_matrix_png_path: outputs/msca_net/confusion_matrix.png
  early_stopping_patience: 20
  early_stopping_min_delta: 0.0
  history_plot_path: outputs/msca_net/history.png
  f1_scores_path: outputs/msca_net/f1_scores.csv
  val_confusion_matrix_npy_path: outputs/msca_net/val_confusion_matrix.npy
  val_confusion_matrix_png_path: outputs/msca_net/val_confusion_matrix.png
  val_f1_scores_path: outputs/msca_net/val_f1_scores.csv
  label_smoothing: 0.05
  gradient_clip_norm: 1.0
  scheduler: reduce_on_plateau
  scheduler_patience: 4
  scheduler_factor: 0.5
  min_learning_rate: 1.0e-05
  roc_curve_path: outputs/msca_net/roc_curve.png
  tsne_path: outputs/msca_net/tsne.png
