seed: 42
model:
  name: sams_tca
  num_channels: 27
  num_classes: 17
  hidden_channels: 64
  num_blocks: 4
  dropout: 0.1
  input_layout: btc
  use_sensor_attention: true
  use_scale_attention: true
  use_temporal_channel_attention: true
  use_class_aware_pooling: false
data:
  data_dir: src/data/Z24-dataset-processed
  input_file: inputs.npy
  label_file: labels.npy
  input_layout: nct
  seq_len: 6000
  normalization: sample
  window_length: 768
  crop_mode: random_train_center_eval
  temporal_stride: 1
  transform: diff
  train_ratio: 0.7
  val_ratio: 0.15
  num_workers: 0
  augment: true
  dummy_samples: 128
  eval_num_crops: 7
  window_mode: crop
  hop_length: 384
  taper: none
  bandpass_filter: false
  sampling_rate: 100.0
  lowcut: 0.5
  highcut: 40.0
  filter_order: 4
  split_strategy: stratified
  jitter_std: 0.01
  scaling_std: 0.08
  time_mask_ratio: 0.05
  channel_mask_ratio: 0.15
training:
  batch_size: 16
  epochs: 10
  learning_rate: 0.001
  weight_decay: 0.0001
  device: auto
  checkpoint_path: outputs/ablations/no_class_aware_pooling/best.pt
  best_checkpoint_path: outputs/ablations/no_class_aware_pooling/best.pt
  last_checkpoint_path: outputs/ablations/no_class_aware_pooling/last.pt
  history_path: outputs/ablations/no_class_aware_pooling/history.csv
  training_log_path: outputs/ablations/no_class_aware_pooling/training_log.txt
  metrics_path: outputs/ablations/no_class_aware_pooling/metrics.json
  confusion_matrix_npy_path: outputs/ablations/no_class_aware_pooling/confusion_matrix.npy
  confusion_matrix_png_path: outputs/ablations/no_class_aware_pooling/confusion_matrix.png
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0
  history_plot_path: outputs/ablations/no_class_aware_pooling/history.png
  f1_scores_path: outputs/ablations/no_class_aware_pooling/f1_scores.csv
  val_confusion_matrix_npy_path: outputs/ablations/no_class_aware_pooling/val_confusion_matrix.npy
  val_confusion_matrix_png_path: outputs/ablations/no_class_aware_pooling/val_confusion_matrix.png
  val_f1_scores_path: outputs/ablations/no_class_aware_pooling/val_f1_scores.csv
  label_smoothing: 0.05
  gradient_clip_norm: 1.0
  scheduler: reduce_on_plateau
  scheduler_patience: 4
  scheduler_factor: 0.5
  min_learning_rate: 1.0e-05
  roc_curve_path: outputs/ablations/no_class_aware_pooling/roc_curve.png
  tsne_path: outputs/ablations/no_class_aware_pooling/tsne.png
